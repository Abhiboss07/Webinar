name: CI

on:
  push:
    branches: [main, phase-2-cms]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: backend/package-lock.json }
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Env validation (with dummy required env)
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/ci
          JWT_SECRET: ci_secret_at_least_16_chars_long
          RAZORPAY_KEY_ID: rzp_test_ci_dummy_key
          RAZORPAY_KEY_SECRET: ci
          GOOGLE_SHEET_ENDPOINT: http://localhost
        run: npm run validate:env
      - name: App requires cleanly (smoke)
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/ci
          JWT_SECRET: ci_secret_at_least_16_chars_long
          RAZORPAY_KEY_ID: rzp_test_ci_dummy_key
          RAZORPAY_KEY_SECRET: ci
          GOOGLE_SHEET_ENDPOINT: http://localhost
        run: node -e "require('./app'); console.log('backend OK')"

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: admin/package-lock.json }
      - name: Install
        working-directory: admin
        run: npm ci
      - name: Build
        working-directory: admin
        run: npm run build
