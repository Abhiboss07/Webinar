<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Registration Confirmed | Youngness Institute</title>
<meta name="theme-color" content="#0f2433" />
<link rel="icon" type="image/png" href="assets/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet" />

<!-- Same compiled design system as the main page -->
<link rel="stylesheet" href="css/main.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>

<body class="text-ink antialiased">
  <main class="mx-auto flex min-h-screen max-w-[640px] flex-col items-center justify-center px-5 py-12">
    <div class="w-full rounded-lg border border-edge bg-white p-7 text-center shadow-card md:p-10">

      <div class="pop mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-clinic/12 text-clinic">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>

      <h1 id="tyHeading" class="font-display text-3xl font-bold text-navy-deep md:text-4xl">Registration Confirmed ✅</h1>
      <p id="tySub" class="mx-auto mt-3 max-w-md text-[15px] leading-relaxed text-ink-light"></p>

      <div id="tyConfirmed">
        <div class="mt-7 text-left">
          <h2 id="tyDetailsHeading" class="mb-3 text-sm font-bold uppercase tracking-wide text-ink-muted">Your Workshop</h2>
          <dl id="tyDetails" class="divide-y divide-edge rounded-[12px] border border-edge bg-sand/60"></dl>
        </div>
        <p id="tyEmail" class="mx-auto mt-5 max-w-md rounded-[12px] border border-clinic/20 bg-clinic/5 px-4 py-3 text-[13px] leading-relaxed text-clinic-deep"></p>
      </div>

      <div class="mt-7 flex flex-col gap-3">
        <a id="tyHome" href="index.html" class="inline-flex w-full items-center justify-center rounded-xl border-[1.5px] border-navy/20 bg-white px-6 py-3.5 text-[15px] font-bold text-navy-deep transition hover:border-navy hover:bg-sand">Back to Workshop Page</a>
      </div>

      <div id="tySupport" class="mt-7 border-t border-edge pt-5 text-[13px] text-ink-muted"></div>
    </div>
  </main>

  <script type="module">
    import FALLBACK from "./config/workshop-config.js";
    // Content comes from the CMS (GET /api/site-config); the bundled config is an
    // offline fallback so this page always renders.
    function resolveApiBase(cfg) {
      var api = (cfg && cfg.api) || {};
      var host = (typeof location !== "undefined" && location.hostname) || "";
      var isDev = host === "localhost" || host === "127.0.0.1" || host === "" || host === "0.0.0.0";
      var base = isDev ? (api.dev || "http://localhost:4000") : (api.prod || api.dev || "");
      return String(base).replace(/\/$/, "");
    }
    (async function () {
      var C = FALLBACK;
      try {
        var res = await fetch(resolveApiBase(FALLBACK) + "/api/site-config", { headers: { Accept: "application/json" } });
        if (res.ok) { var j = await res.json(); var d = j && j.data ? j.data : j; if (d && d.workshop) C = d; }
      } catch (e) { /* keep fallback */ }
      var w = C.workshop || {}, p = C.payment || {}, ty = p.thankYou || {}, foot = (C.footer || {}).contact || {};

      // Token interpolation for the few strings we show (price/date/etc.).
      var tokens = { name: w.name, date: w.date, time: w.time, venue: w.venue, price: w.price, brand: (C.brand || {}).name };
      function interp(s) { return typeof s === "string" ? s.replace(/\{\{(\w+)\}\}/g, function (m, k) { return tokens[k] != null ? tokens[k] : m; }) : s; }
      function deEntity(s) { var t = document.createElement("textarea"); t.innerHTML = s == null ? "" : s; return t.value; }

      // Confirmed registration saved ONLY after a verified payment (sessionStorage),
      // with a URL ?ref= fallback for the payment reference.
      var reg = {};
      try { reg = JSON.parse(sessionStorage.getItem("youngness_confirmed") || "{}"); } catch (e) {}
      var params = new URLSearchParams(location.search);
      var ref = reg.paymentId || params.get("ref") || "";

      // Access guard: this page is only meaningful after a verified payment.
      // Without a confirmed registration (or a payment reference), don't show details.
      var hasConfirmation = !!(reg && reg.paymentId) || !!params.get("ref");
      if (!hasConfirmation) {
        document.getElementById("tyHeading").textContent = "No confirmed registration found";
        document.getElementById("tySub").textContent = deEntity(interp(ty.noAccess || "Please complete your payment from the workshop page."));
        document.getElementById("tyConfirmed").style.display = "none";
        var icon = document.querySelector(".pop");
        if (icon) icon.className = "mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-terra/12 text-terra";
      } else {
      document.getElementById("tyHeading").textContent = deEntity(interp(ty.heading || "Registration Confirmed ✅"));
      document.getElementById("tySub").textContent = deEntity(interp(ty.sub || "Your workshop seat is confirmed."));
      document.getElementById("tyDetailsHeading").textContent = deEntity(ty.detailsHeading || "Your Workshop");
      if ((C.brand || {}).name) document.title = "Registration Confirmed | " + deEntity(C.brand.name);

      var rows = [
        ["Status", "Confirmed · Paid"],
        ["Workshop", deEntity(interp(w.name))],
        ["Date", deEntity(interp(w.date))],
        ["Time", deEntity(interp(w.time))],
        ["Mode", deEntity(interp(w.venue))],
      ];
      if (reg.amount) rows.push(["Amount Paid", (reg.currency === "INR" || !reg.currency ? "₹" : reg.currency + " ") + reg.amount]);
      if (reg.method) rows.push(["Payment Method", deEntity(reg.method)]);
      if (ref) rows.push(["Payment Reference", ref]);
      if (reg.name) rows.push(["Registered Name", deEntity(reg.name)]);

      document.getElementById("tyDetails").innerHTML = rows.map(function (r) {
        return '<div class="flex items-start justify-between gap-4 px-4 py-3">' +
          '<dt class="text-[13px] font-medium text-ink-muted">' + r[0] + '</dt>' +
          '<dd class="text-right text-[14px] font-semibold text-navy-deep">' + r[1] + '</dd></div>';
      }).join("");

      // Email confirmation message
      var emailMsg = deEntity(interp(ty.emailConfirm || "")).replace(/\{email\}/g, reg.email || "your email");
      var emailEl = document.getElementById("tyEmail");
      if (emailMsg) emailEl.textContent = emailMsg; else emailEl.style.display = "none";
      }

      // Support contact (shown in all cases)
      var phone = foot.phone, phoneTel = foot.phoneTel || (foot.phone || "").replace(/\s/g, ""), email = foot.email;
      var bits = [];
      if (phone) bits.push('📞 <a class="font-semibold text-navy hover:text-gold" href="tel:' + phoneTel + '">' + phone + '</a>');
      if (email) bits.push('✉️ <a class="font-semibold text-navy hover:text-gold" href="mailto:' + email + '">' + email + '</a>');
      document.getElementById("tySupport").innerHTML =
        '<p class="mb-1 font-bold text-navy-deep">' + deEntity(ty.supportHeading || "Need help?") + '</p>' + bits.join(' &nbsp;·&nbsp; ');
    })();
  </script>
</body>
</html>
