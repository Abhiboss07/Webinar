<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- SEO defaults (overridden at runtime from config/workshop-config.js → seo) -->
<title>Webinar Registration | Youngness Institute</title>
<meta name="description" content="Live workshop registration." />
<meta name="keywords" content="" />
<meta name="author" content="Youngness Institute" />
<meta name="theme-color" content="#0f2433" />
<link rel="canonical" href="" />
<meta property="og:type" content="website" />
<meta property="og:title" content="" />
<meta property="og:description" content="" />
<meta property="og:image" content="" />
<meta property="og:site_name" content="Youngness Institute" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="" />
<meta name="twitter:description" content="" />
<meta name="twitter:image" content="" />
<link rel="icon" type="image/png" href="assets/logo.png" />

<!-- Preload the hero (LCP) image for faster first paint -->
<link rel="preload" as="image" href="assets/Main_Doctor.jpg" fetchpriority="high" />

<!-- Fonts: Fraunces (display) + DM Sans (body) — Youngness design system -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet" />

<!-- Compiled Tailwind + custom component styles + media queries.
     Run `npm run build:css` after editing classes; the deployed site is fully static. -->
<link rel="stylesheet" href="css/main.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>

<body class="text-ink antialiased pb-[76px] md:pb-0">

  <!-- =====================================================================
       Sections are rendered into these mount points from
       config/workshop-config.js by sections/*.js + js/app.js. To change
       content, edit ONLY config/workshop-config.js. To change layout, edit
       the section renderers in /sections.
       ===================================================================== -->
  <div id="mount-header"></div>
  <main id="top"></main>
  <div id="mount-footer"></div>
  <div id="mount-sticky"></div>
  <div id="mount-popup"></div>
  <div id="mount-modal"></div>

  <noscript>
    <div style="max-width:640px;margin:80px auto;padding:0 24px;text-align:center;font-family:sans-serif;color:#1e3d52;">
      <h1>Please enable JavaScript</h1>
      <p>This registration page needs JavaScript to load. Please enable it or contact us to register.</p>
    </div>
  </noscript>

  <!-- App entry (ES module). It imports config, sections, api, payment, form, popup. -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
